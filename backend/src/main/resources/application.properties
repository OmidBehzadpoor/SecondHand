server.port=8080
spring.application.name=secondhand-backend

spring.profiles.active=sqlite

jwt.secret=${JWT_SECRET:your-very-long-random-secret-key-at-least-32-characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health}

app.upload.dir=${UPLOAD_DIR:uploads/advertisements}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=7MB

# --- API Documentation (Swagger UI + Scalar) ---
# Swagger UI:  http://localhost:8080/swagger-ui.html
# Scalar UI:   http://localhost:8080/scalar
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
scalar.path=/scalar
scalar.url=/v3/api-docs

# ظاهر - تم Scalar
scalar.theme=deep_space
scalar.layout=modern
scalar.darkMode=true
scalar.hideDarkModeToggle=false
scalar.forceThemeMode=dark

# نمایش
scalar.showSidebar=true
scalar.hideModels=false
scalar.hideSearch=false
scalar.hideTestRequestButton=false

# مرتب‌سازی
scalar.tagSorter=alpha
scalar.operationSorter=method
scalar.operationTitleSource=summary

# دانلود مستندات
scalar.documentDownloadType=both

# سرچ
scalar.searchHotKey=k

# پیش‌فرض بودن Bearer در Auth (باید دقیقا با نام Security Scheme یکی باشد)
scalar.authentication.preferredSecurityScheme=bearerAuth