server.port=8080
spring.application.name=secondhand-backend

spring.profiles.active=sqlite

jwt.secret=${JWT_SECRET:your-very-long-random-secret-key-at-least-32-characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health}

app.upload.dir=${UPLOAD_DIR:uploads/advertisements}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=7MB