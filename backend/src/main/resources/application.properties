server.port=8080
spring.application.name=secondhand-backend

spring.profiles.active=sqlite,security

jwt.secret=${JWT_SECRET:your-very-long-random-secret-key-at-least-32-characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=SecondHandVerifyBot
app.phone.verification.enabled=${PHONE_VERIFICATION_ENABLED:false}

telegram.proxy.host=${TELEGRAM_PROXY_HOST:}
telegram.proxy.port=${TELEGRAM_PROXY_PORT:0}

spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

app.email.verification.enabled=${EMAIL_VERIFICATION_ENABLED:false}
app.email.from=onboarding@resend.dev